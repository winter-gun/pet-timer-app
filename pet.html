<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self'
          https://*.googleapis.com
          https://*.firebaseio.com
          https://*.firebaseapp.com
          wss://*.firebaseio.com
          ws://localhost:*
          http://localhost:*;
        img-src 'self' data:;
        font-src 'self' data:;
      "
    />
    <title>Pet</title>
    <style>
      /* No color-scheme declaration. When color-scheme is set (even to
         'light dark'), Chromium paints an OS-themed canvas color BENEATH
         the page's CSS background. In a transparent Electron window that
         shows up as an opaque white (light) or black (dark) backdrop that
         CSS `background: transparent` cannot override. */
      html,
      body,
      #root {
        background: transparent !important;
        background-color: transparent !important;
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pet/pet.tsx"></script>
  </body>
</html>
